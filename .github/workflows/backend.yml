name: Backend

on:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - "global.json"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - "global.json"
      - ".github/workflows/backend.yml"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore backend/JobsGeParser/JobsGeParser.csproj
    - name: Build
      run: dotnet build backend/JobsGeParser/JobsGeParser.csproj -c Release --no-restore
    - name: Publish
      if: github.ref == 'refs/heads/master'
      run: dotnet publish backend/JobsGeParser/JobsGeParser.csproj --self-contained -r win-x64 -c Release -o ./pub
      
    - name: Upload a Build Artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4.3.1
      with:
        path: ./pub
